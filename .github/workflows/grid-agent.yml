name: Build grid-agent

on:
  push:
    branches:
      - main
    paths:
      - 'fs/grid-agent/**'
      - '.github/workflows/grid-agent.yml'
  create:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/grid-agent

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        working-directory: fs/grid-agent
        run: go vet ./...

      - name: Staticcheck
        working-directory: fs/grid-agent
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test with race detector
        working-directory: fs/grid-agent
        # -p=1 forces sequential package tests so they don't fight over UDP ports 64218/64219
        run: go test -race -p=1 -count=1 -timeout=180s ./...

      - name: Test coverage
        working-directory: fs/grid-agent
        run: |
          go test -p=1 -count=1 -timeout=180s -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

  build-binaries:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        working-directory: fs/grid-agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -buildid=" \
            -o grid-agent-${{ matrix.suffix }} \
            ./cmd/grid-agent
          ls -lh grid-agent-${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: grid-agent-${{ matrix.suffix }}
          path: fs/grid-agent/grid-agent-${{ matrix.suffix }}

  # Build Docker images, push to GHCR, AND produce a docker-save tarball
  # compatible with RouterOS /container/add file=
  build-docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/arm64
            suffix: arm64
          - platform: linux/amd64
            suffix: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build per-arch image and load it into the local docker daemon
      - name: Build single-arch image
        uses: docker/build-push-action@v5
        with:
          context: fs/grid-agent
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: grid-agent:${{ matrix.suffix }}

      # Save as a Docker-format tarball that RouterOS accepts
      - name: Docker save tarball
        run: |
          docker save grid-agent:${{ matrix.suffix }} -o grid-agent-${{ matrix.suffix }}.tar
          ls -lh grid-agent-${{ matrix.suffix }}.tar

      - uses: actions/upload-artifact@v4
        with:
          name: grid-agent-docker-${{ matrix.suffix }}
          path: grid-agent-${{ matrix.suffix }}.tar

  # Push multi-arch manifest to GHCR
  push-docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: fs/grid-agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'grid-agent-*' \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
